services:
  sf-validator:
    build: .
    image: sf85-86-validator:local
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      PORT: "8000"
      SF_VALIDATOR_MAX_UPLOAD_BYTES: "26214400"
      SF_VALIDATOR_SESSION_TTL_SECONDS: "3600"
      SF_VALIDATOR_TEMP_DIR: "/tmp/sf-validator"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
