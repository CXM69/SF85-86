services:
  - type: web
    name: SF86-validator
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m sf_validator.web"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SF_VALIDATOR_AUTH_USERNAME
        sync: false
      - key: SF_VALIDATOR_AUTH_PASSWORD
        sync: false
